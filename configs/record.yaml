robot:
  type: piper
  sides: [left]      # active arm set; set to [right] to use the other set instead
  # NOTE: these home_pose / home_gripper values are IGNORED by homing. A teleop
  # master-slave pair can only be homed to firmware ZERO (ReqMasterArmMoveToHome);
  # a custom joint pose would need JointCtrl, which breaks the master-slave pairing.
  # Kept only for reference (PiperConfig still validates them).
  home_pose:
    left:  [-90000, 0, 0, 90000, 0, -90000]
    right: [90000, 0, 0, -90000, 0, 90000]
  home_gripper:
    left:  open
    right: open

teleop:
  type: piper_teleop
  sides: [left]      # must match robot.sides so recorded actions line up

dataset:
  # Saved to $HF_LEROBOT_HOME/<repo_id>; the `record` pixi task points
  # HF_LEROBOT_HOME at ./data, so this lands in data/cyclevla/real_robot_decomposed_progress.
  # repo_id must match the openpi TrainConfig used for real-robot PI0.5 finetuning.
  repo_id: cyclevla/real_robot_decomposed_progress
  # High-level task instruction, baked into every frame as `task`. It MUST be one
  # of the keys in distal/hardware/subtasks.py (the convert maps it to that task's
  # ordered subtask list). During teleop, press 'y' to mark the end of each subtask
  # (K subtasks -> K-1 presses); the per-frame `subtask_index` drives the offline
  # decomposition in distal/hardware/convert_to_cyclevla.py. Change this per task.
  single_task: pick up the black bowl and place it on the plate
  fps: 20
  episode_time_s: 600  # upper bound per episode; press -> to end+save early
  # reset_time_s is UNUSED by distal/hardware/record.py: instead of a blind timed
  # reset window, the arm is homed after each episode and the next one starts only
  # when you press SPACE. Kept because DatasetRecordConfig still defines the field.
  reset_time_s: 15
  # Episodes to ADD this session. record.py auto-resumes an existing dataset, so
  # rerunning `pixi run record` appends another `num_episodes` into the same one.
  num_episodes: 100
  streaming_encoding: true
  encoder_threads: 5
  vcodec: auto
  push_to_hub: false

display_data: false
display_compressed_images: true
