robot:
  type: piper
  sides: [left]      # active arm set; set to [right] to use the other set instead
  # NOTE: these home_pose / home_gripper values are IGNORED by homing. A teleop
  # master-slave pair can only be homed to firmware ZERO (ReqMasterArmMoveToHome);
  # a custom joint pose would need JointCtrl, which breaks the master-slave pairing.
  # Kept only for reference (PiperConfig still validates them).
  home_pose:
    left:  [-90000, 0, 0, 90000, 0, -90000]
    right: [90000, 0, 0, -90000, 0, 90000]
  home_gripper:
    left:  open
    right: open

teleop:
  type: piper_teleop
  sides: [left]      # must match robot.sides so recorded actions line up

dataset:
  # Saved to $HF_LEROBOT_HOME/<repo_id>; the `record` pixi task points
  # HF_LEROBOT_HOME at ./data, so this lands in data/cyclevla/real_robot_decomposed_progress.
  # repo_id must match the openpi TrainConfig used for real-robot PI0.5 finetuning.
  repo_id: cyclevla/real_robot_decomposed_progress
  single_task: Test  # set to the task's language instruction before recording
  fps: 20
  episode_time_s: 600
  reset_time_s: 15
  num_episodes: 50
  streaming_encoding: true
  encoder_threads: 5
  vcodec: auto
  push_to_hub: false

display_data: false
display_compressed_images: true
