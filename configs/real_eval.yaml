# Real-robot CycleVLA eval config (draccus -> distal.hardware.real_eval_common.RealEvalConfig).
# Used by both entry points:
#   pixi run python -m distal.hardware.run_real_eval_openpi_transit  --config_path=configs/real_eval.yaml
#   pixi run python -m distal.hardware.run_real_eval_openpi_cyclevla --config_path=configs/real_eval.yaml
# The 9-D PI0.5 policy is served separately by the openpi WebSocket server
# (cyclevla_code/openpi; serve_policy.py with config pi05_libero_cyclevla). Start
# that FIRST — these scripts block until it is reachable on host:port.
#
# Episode loop (mirrors `pixi run record`): the arm homes to zero, then
#   SPACE = start the episode   ->  = stop + save + print "saved & encoded"
#   <-    = discard + re-record  Esc = end the session
# After each saved episode the arm re-homes; press SPACE to run the next one.
# See distal/hardware/REAL_EVAL.md for the full workflow.

# ---- policy server ----
host: 0.0.0.0
port: 8000
num_open_loop_steps: 5      # actions executed before requerying the server (<=10)

# ---- task / robot ----
# MUST be one of the keys in distal/hardware/subtasks.py (drives the per-subtask
# prompts the policy was trained on).
single_task: place the can of corn on the pan and the milk carton in the pot
sides: [left]               # active arm set; sides[0] is driven (left set is the default rig)
fps: 20                     # control loop rate (matches the training/recording fps)
max_steps: 5000              # hard per-episode step budget
num_steps_wait: 0           # settle steps before the first action (0 on the real arm)
num_episodes: 30             # episodes to run this session (ENTER between episodes)
home: true                  # firmware home (master-slave 0x191) before the run
restore_teleop_on_exit: true

# ---- EEF control / safety (start conservative, raise once tracking looks good) ----
eef_speed_rate: 30          # MotionCtrl_2 speed % (0-100)
delta_base: chunk           # "chunk" = accumulate Δ from the EEF read at each requery; "live" = Δ on the live EEF
max_pos_step: 0.50          # per-step ΔEEF position clamp (m); <=0 disables
max_rot_step: 3.0          # per-step ΔEEF rotation clamp (rad); 1.0 verified — 0.3 over-clips the policy's rotation deltas; <=0 disables
# invert_gripper: false       # flip gripper polarity vs sim — VERIFY open/close on the first rollout
# Measured training-data gripper obs range: bimodal — closed/grasp ≈ 4.3, full open ≈ 9.8
# (valley ≈ 7.0). Policy outputs absolute stroke in this space; no ±1 command.
gripper_open: 10.0          # obs-unit FULL OPEN (data ~9.8). Hysteresis open target (not used by binarize)
gripper_closed: 0.0         # CLOSE target (0 = firm full close onto object); ignored in continuous
gripper_close_threshold: 6.0  # binarize FIRM-CLOSE trigger: g<=this -> full close, g>this -> pos-control; IGNORED in continuous & hysteresis. Base/default; per-task overrides in task_overrides below.
# --- gripper mode selection (precedence: hysteresis > binarize > raw) ---
# gripper_binarize false = CONTINUOUS/pos-control: command the policy's raw stroke (exact
# training state, close ~4.3→43mm / open ~9.8→98mm). true = FIRM-CLOSE-ONLY hybrid: below
# gripper_close_threshold → full close, above → normal pos-control (opening reaches ~9.8).
gripper_binarize: true
# gripper_hysteresis true OVERRIDES the above with a dual-threshold latch (robust, canonical
# — mirrors LIBERO binarize_gripper_actions): OPEN when g>=gripper_open_above, CLOSE when
# g<=gripper_close_below, else HOLD. Non-brittle band (validated: 99.2% match, 0 drift);
# prefer this over a single threshold for crisp open/close without chatter.
gripper_hysteresis: false
gripper_open_above: 9.5     # hysteresis: latch OPEN at/above this (open cluster ~9.8)
gripper_close_below: 8.25    # hysteresis: latch CLOSED at/below this (close cluster ~4.3)
# Reset/home open width (obs units), DECOUPLED from gripper_open so the start pose and the
# per-step open target tune separately. 10.0 = training full-open (~9.8) so the arm STARTS
# in the open state the policy expects (policy immediately takes over during the episode).
gripper_reset_open: 10.0
gripper_effort: 500         # GripperCtrl effort (0.001 N·m, 0-5000); firm grip. Base/default; per-task overrides in task_overrides below.
no_arm: false               # diagnostic: cameras + server only, never command the arm (USB-CAN isolation)
camera_fps: null            # override RealSense fps (e.g. 15) to cut USB bandwidth; null keeps 30

# ---- output (gitignored: data/ is in .gitignore) ----
video_dir: data/rollouts
log_dir: data/rollouts/logs

# ---- dry run (no arm): build a synthetic obs, query the server, print the action ----
dry_run: false

# ---- cyclevla-only (ignored by the transit script) ----
progress_threshold: 0.90    # p_t level that triggers the VLM check. Base/default; per-task overrides in task_overrides below.
vlm_check_delay_sec: 2.0    # HOLD (s) after the 90% check before grabbing the VLM image; lets you nudge the object to force a backtrack. 0 = immediate.
max_subtask_retries: 3
vlm_model: gpt-5.5
vlm_temperature: 1.0
mbr_num_seeds: 8
mbr_distance_metric: l2
mbr_use_failed_repulsion: false
mbr_vanilla: false

# ---- per-task overrides (auto-applied from single_task; win over the base values above) ----
# task name (must match a key in distal/hardware/subtasks.py) -> { field: value }.
# List ONLY fields that differ from the base for that task; omit a field to keep the base.
task_overrides:
  hang the green teapot on the mug holder:
    gripper_close_threshold: 8.25   # firmer close for the teapot handle
    gripper_effort: 3000            # stronger grip to hold the teapot
  place the can of corn on the pan and the milk carton in the pot:
    progress_threshold: 0.95        # stricter 90%->95% gate for this task
  # place the grape on the red plate and the apple on the green plate: (none — all base values)
